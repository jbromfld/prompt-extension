<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Copilot Prompt Library</title>
    <style>
        body {
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            color: var(--vscode-foreground);
            background: var(--vscode-editor-background);
            margin: 0;
            padding: 16px;
        }

        .section {
            border: 1px solid var(--vscode-panel-border);
            border-radius: 6px;
            padding: 12px;
            background: var(--vscode-sideBar-background);
        }

        .title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        select,
        input,
        button {
            font: inherit;
            color: inherit;
        }

        select,
        input {
            border: 1px solid var(--vscode-input-border);
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border-radius: 4px;
            padding: 8px;
        }

        input {
            flex: 1;
        }

        button {
            border: none;
            border-radius: 4px;
            padding: 8px 10px;
            cursor: pointer;
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
        }

        button:hover {
            background: var(--vscode-button-hoverBackground);
        }

        .list {
            border: 1px solid var(--vscode-panel-border);
            border-radius: 6px;
            max-height: 280px;
            overflow: auto;
        }

        .item {
            padding: 10px;
            border-bottom: 1px solid var(--vscode-panel-border);
            cursor: pointer;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item:hover,
        .item.selected {
            background: var(--vscode-list-hoverBackground);
        }

        .item-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .item-meta {
            color: var(--vscode-descriptionForeground);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .item-body {
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 62px;
            overflow: hidden;
        }

        .message {
            margin-top: 10px;
            padding: 8px;
            border-radius: 4px;
            display: none;
            border: 1px solid transparent;
        }

        .message.info {
            display: block;
            background: color-mix(in srgb, var(--vscode-editorInfo-foreground) 15%, transparent);
            border-color: var(--vscode-editorInfo-foreground);
        }

        .message.success {
            display: block;
            background: color-mix(in srgb, var(--vscode-testing-iconPassed) 15%, transparent);
            border-color: var(--vscode-testing-iconPassed);
        }

        .message.error {
            display: block;
            background: color-mix(in srgb, var(--vscode-editorError-foreground) 15%, transparent);
            border-color: var(--vscode-editorError-foreground);
        }

        .rating {
            margin-top: 12px;
            border-top: 1px solid var(--vscode-panel-border);
            padding-top: 12px;
            display: none;
        }

        .stars {
            display: flex;
            gap: 4px;
            margin: 8px 0;
        }

        .star {
            font-size: 22px;
            color: var(--vscode-descriptionForeground);
            cursor: pointer;
        }

        .star.active {
            color: #f4b400;
        }
    </style>
</head>

<body>
    <div class="section">
        <div class="title">Prompt Library</div>

        <div class="row">
            <select id="categoryFilter">
                <option value="">All Categories</option>
            </select>
            <input id="searchInput" type="text" placeholder="Search prompts...">
        </div>

        <div class="row">
            <button id="insertButton">Insert Into Copilot Chat</button>
        </div>

        <div id="promptList" class="list"></div>
        <div id="message" class="message"></div>

        <div id="ratingSection" class="rating">
            <div><strong>Rate selected prompt</strong></div>
            <div class="stars" id="stars"></div>
            <button id="submitRating" disabled>Submit Rating</button>
        </div>
    </div>

    <script>
        (function () {
            const vscode = acquireVsCodeApi();

            const categoryFilter = document.getElementById('categoryFilter');
            const searchInput = document.getElementById('searchInput');
            const insertButton = document.getElementById('insertButton');
            const promptList = document.getElementById('promptList');
            const message = document.getElementById('message');
            const ratingSection = document.getElementById('ratingSection');
            const stars = document.getElementById('stars');
            const submitRating = document.getElementById('submitRating');

            let prompts = [];
            let selectedPrompt = null;
            let selectedRating = 0;
            let searchTimer;

            for (let i = 1; i <= 5; i++) {
                const el = document.createElement('span');
                el.className = 'star';
                el.dataset.value = String(i);
                el.textContent = '★';
                el.addEventListener('click', () => {
                    selectedRating = i;
                    renderStars();
                    submitRating.disabled = !selectedPrompt;
                });
                stars.appendChild(el);
            }

            function renderStars() {
                stars.querySelectorAll('.star').forEach((el, idx) => {
                    if (idx < selectedRating) {
                        el.classList.add('active');
                    } else {
                        el.classList.remove('active');
                    }
                });
            }

            function showMessage(text, type) {
                message.textContent = text;
                message.className = `message ${type}`;
            }

            function renderCategories(items) {
                categoryFilter.innerHTML = '<option value="">All Categories</option>';
                items.forEach((item) => {
                    const option = document.createElement('option');
                    option.value = String(item.id);
                    option.textContent = item.display_name;
                    categoryFilter.appendChild(option);
                });
            }

            function renderPrompts(items) {
                prompts = items;
                promptList.innerHTML = '';

                if (!items.length) {
                    const empty = document.createElement('div');
                    empty.className = 'item';
                    empty.textContent = 'No prompts found.';
                    promptList.appendChild(empty);
                    return;
                }

                items.forEach((prompt) => {
                    const item = document.createElement('div');
                    item.className = 'item';
                    item.innerHTML = `
                        <div class="item-title">${escapeHtml(prompt.title || prompt.id)}</div>
                        <div class="item-meta">${escapeHtml((prompt.category && prompt.category.display_name) || 'Uncategorized')} | used ${prompt.usage_count || 0}</div>
                        <div class="item-body">${escapeHtml(prompt.prompt || '')}</div>
                    `;
                    item.addEventListener('click', () => {
                        selectedPrompt = prompt;
                        promptList.querySelectorAll('.item').forEach((n) => n.classList.remove('selected'));
                        item.classList.add('selected');
                        ratingSection.style.display = 'block';
                        submitRating.disabled = selectedRating === 0;
                        vscode.postMessage({ type: 'selectPrompt', promptId: prompt.id });
                    });
                    promptList.appendChild(item);
                });
            }

            function runSearch() {
                const query = searchInput.value.trim();
                const categoryId = categoryFilter.value;
                vscode.postMessage({
                    type: 'searchPrompts',
                    query,
                    categoryId
                });
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(runSearch, 160);
            });

            categoryFilter.addEventListener('change', runSearch);

            insertButton.addEventListener('click', () => {
                if (!selectedPrompt) {
                    showMessage('Select a prompt first.', 'error');
                    return;
                }

                vscode.postMessage({
                    type: 'sendToCopilot',
                    prompt: selectedPrompt.prompt,
                    ratingPrompt: selectedPrompt
                });
            });

            submitRating.addEventListener('click', () => {
                if (!selectedPrompt || selectedRating === 0) {
                    return;
                }

                vscode.postMessage({
                    type: 'submitRating',
                    promptId: selectedPrompt.id,
                    rating: selectedRating
                });
            });

            window.addEventListener('message', (event) => {
                const msg = event.data;
                switch (msg.type) {
                    case 'categoriesLoaded':
                        renderCategories(msg.categories || []);
                        break;
                    case 'promptSearchResults':
                        renderPrompts(msg.prompts || []);
                        break;
                    case 'showMessage':
                        showMessage(msg.message || '', msg.messageType || 'info');
                        break;
                    case 'showRatingPrompt':
                        if (msg.prompt) {
                            selectedPrompt = msg.prompt;
                            ratingSection.style.display = 'block';
                        }
                        break;
                }
            });

            vscode.postMessage({ type: 'getCategories' });
            vscode.postMessage({ type: 'searchPrompts', query: '', categoryId: '' });
        })();
    </script>
</body>

</html>
