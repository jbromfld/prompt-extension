<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Copilot Assistant</title>
    <style>
        body {
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            font-weight: var(--vscode-font-weight);
            color: var(--vscode-foreground);
            background-color: var(--vscode-editor-background);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid var(--vscode-panel-border);
            border-radius: 5px;
            background-color: var(--vscode-panel-background);
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--vscode-panelTitle-activeForeground);
        }

        .search-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
        }

        input[type="text"],
        textarea,
        select {
            background-color: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            padding: 8px;
            border-radius: 3px;
            font-family: inherit;
            font-size: inherit;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--vscode-focusBorder);
        }

        .search-input {
            flex: 1;
        }

        .category-filter {
            min-width: 140px;
        }

        .prompt-input {
            width: 100%;
            min-height: 80px;
            resize: vertical;
        }

        .selected-prompts {
            min-height: 80px;
            border: 1px solid var(--vscode-input-border);
            border-radius: 3px;
            padding: 10px;
            background-color: var(--vscode-input-background);
            margin-bottom: 10px;
        }

        .selected-prompt-item {
            background-color: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
            padding: 5px 10px;
            margin: 2px;
            border-radius: 3px;
            display: inline-block;
            font-size: 12px;
            cursor: pointer;
        }

        .selected-prompt-item:hover {
            background-color: var(--vscode-badge-background);
            opacity: 0.8;
        }

        .selected-prompt-item .remove-btn {
            margin-left: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            background-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            padding: 8px 16px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
        }

        button:hover {
            background-color: var(--vscode-button-hoverBackground);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .secondary-button {
            background-color: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
        }

        .secondary-button:hover {
            background-color: var(--vscode-button-secondaryHoverBackground);
        }

        .danger-button {
            background-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: 1px solid var(--vscode-input-border);
            padding: 8px 16px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
        }

        .danger-button:hover {
            background-color: #dc3545;
            color: white;
        }

        .cache-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cache-status {
            font-size: 12px;
            color: var(--vscode-descriptionForeground);
            background-color: var(--vscode-input-background);
            padding: 8px;
            border-radius: 3px;
            border: 1px solid var(--vscode-input-border);
        }

        .prompt-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--vscode-panel-border);
            border-radius: 3px;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: var(--vscode-dropdown-background);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .autocomplete-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--vscode-panel-border);
            border-radius: 3px;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: var(--vscode-dropdown-background);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .prompt-item {
            padding: 10px;
            border-bottom: 1px solid var(--vscode-panel-border);
            cursor: pointer;
        }

        .prompt-item:hover {
            background-color: var(--vscode-list-hoverBackground);
        }

        .prompt-item:last-child {
            border-bottom: none;
        }

        .prompt-type {
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            margin-right: 10px;
        }

        .prompt-text {
            margin-top: 5px;
            font-size: 13px;
            color: var(--vscode-foreground);
        }

        .hidden {
            display: none;
        }

        .loading {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .config-info {
            font-size: 12px;
            color: var(--vscode-descriptionForeground);
            background-color: var(--vscode-input-background);
            padding: 10px;
            border-radius: 3px;
            border: 1px solid var(--vscode-input-border);
            margin-bottom: 15px;
        }

        .events-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .events-table th,
        .events-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid var(--vscode-panel-border);
        }

        .events-table th {
            background-color: var(--vscode-panel-background);
            font-weight: bold;
        }

        .events-table tr:hover {
            background-color: var(--vscode-list-hoverBackground);
        }

        .status-success {
            color: #4CAF50;
        }

        .status-failure {
            color: #F44336;
        }

        .status-pending {
            color: #FF9800;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Configuration Section -->
        <div id="configSection" class="section">
            <div class="section-title">⚙️ Configuration</div>
            <div class="config-info">
                <div><strong>User ID:</strong> <span id="userId">Not configured</span></div>
                <div><strong>Team ID:</strong> <span id="teamId">Not configured</span></div>
                <div><strong>Prompt Search:</strong> <span id="promptSearchEnabled">Disabled</span></div>
            </div>
        </div>

        <!-- Prompt Search Section -->
        <div id="promptSearchSection" class="section">
            <div class="section-title">🔍 Smart Prompt Search</div>
            <div class="search-container">
                <div class="search-row">
                    <select id="categoryFilter" class="category-filter">
                        <option value="">All Categories</option>
                    </select>
                    <input type="text" id="promptSearch" class="search-input" placeholder="Search for prompts...">
                </div>
                <div id="autocompleteList" class="autocomplete-list hidden"></div>
                <div id="selectedPrompts" class="selected-prompts"></div>
                <div class="button-group">
                    <button id="sendToCopilot">Send to Copilot Chat</button>
                    <button id="clearSelection" class="secondary-button">Clear Selection</button>
                </div>
            </div>
        </div>

        <!-- Cache Management Section -->
        <div id="cacheSection" class="section">
            <div class="section-title">💾 Cache Management</div>
            <div class="cache-info">
                <div id="cacheStatus" class="cache-status">Loading cache info...</div>
                <div class="button-group">
                    <button id="updateCache" class="secondary-button">Update Cache</button>
                    <button id="clearCache" class="danger-button">Clear Cache</button>
                </div>
            </div>
        </div>

        <!-- Team Events Section -->
        <div id="teamEventsSection" class="section">
            <div class="section-title">📊 Team Events</div>
            <div class="button-group">
                <button id="syncCache">Sync Cache</button>
            </div>
            <div id="eventsContainer">
                <table id="eventsTable" class="events-table hidden">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Result</th>
                            <th>Time</th>
                            <th>Details</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="noEventsMessage" class="hidden">
                    <p>No team events available. Make sure you have configured your team ID and enabled team events.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const vscode = acquireVsCodeApi();
            let currentConfig = {};

            // DOM elements
            const promptSearchInput = document.getElementById('promptSearch');
            const categoryFilter = document.getElementById('categoryFilter');
            const autocompleteList = document.getElementById('autocompleteList');
            const selectedPrompts = document.getElementById('selectedPrompts');
            const sendToCopilotButton = document.getElementById('sendToCopilot');
            const clearSelectionButton = document.getElementById('clearSelection');
            const syncCacheButton = document.getElementById('syncCache');
            const eventsTable = document.getElementById('eventsTable');
            const updateCacheButton = document.getElementById('updateCache');
            const clearCacheButton = document.getElementById('clearCache');
            const cacheStatus = document.getElementById('cacheStatus');

            // Configuration display elements
            const userIdSpan = document.getElementById('userId');
            const teamIdSpan = document.getElementById('teamId');
            const promptSearchEnabledSpan = document.getElementById('promptSearchEnabled');

            let searchTimeout;
            let prompts = [];
            let events = [];
            let selectedPromptList = [];

            // Event listeners
            promptSearchInput.addEventListener('input', handleSearchInput);
            promptSearchInput.addEventListener('focus', handleSearchInput);
            promptSearchInput.addEventListener('blur', () => {
                // Delay hiding to allow clicks on autocomplete items
                setTimeout(() => autocompleteList.classList.add('hidden'), 200);
            });
            categoryFilter.addEventListener('change', handleSearchInput);
            sendToCopilotButton.addEventListener('click', handleSendToCopilot);
            clearSelectionButton.addEventListener('click', handleClearSelection);
            syncCacheButton.addEventListener('click', handleSyncCache);
            updateCacheButton.addEventListener('click', handleUpdateCache);
            clearCacheButton.addEventListener('click', handleClearCache);

            function handleSearchInput() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const query = promptSearchInput.value.trim();
                    const categoryId = categoryFilter.value;

                    if (query.length >= 1) {
                        vscode.postMessage({
                            type: 'searchPrompts',
                            query: query,
                            categoryId: categoryId || undefined
                        });
                    } else {
                        autocompleteList.classList.add('hidden');
                    }
                }, 150); // Faster response for autocomplete
            }

            function handleSendToCopilot() {
                if (selectedPromptList.length === 0) {
                    vscode.window.showWarningMessage('Please select at least one prompt');
                    return;
                }

                const combinedPrompt = selectedPromptList.map(p => p.prompt).join('\n\n---\n\n');

                vscode.postMessage({
                    type: 'sendToCopilot',
                    prompt: combinedPrompt
                });
            }

            function handleClearSelection() {
                selectedPromptList = [];
                renderSelectedPrompts();
            }

            function handleSyncCache() {
                syncCacheButton.disabled = true;
                syncCacheButton.innerHTML = '<span class="loading">⟳</span> Syncing...';

                vscode.postMessage({
                    type: 'syncCache'
                });

                setTimeout(() => {
                    syncCacheButton.disabled = false;
                    syncCacheButton.innerHTML = 'Sync Cache';
                }, 3000);
            }

            function handleUpdateCache() {
                updateCacheButton.disabled = true;
                updateCacheButton.innerHTML = 'Updating...';

                vscode.postMessage({ type: 'updateCache' });

                // Re-enable after 3 seconds
                setTimeout(() => {
                    updateCacheButton.disabled = false;
                    updateCacheButton.innerHTML = 'Update Cache';
                }, 3000);
            }

            function handleClearCache() {
                vscode.postMessage({ type: 'clearCache' });
            }

            function selectPrompt(prompt) {
                // Check if prompt is already selected
                if (selectedPromptList.find(p => p.id === prompt.id)) {
                    return; // Already selected
                }

                // Add to selection
                selectedPromptList.push(prompt);
                autocompleteList.classList.add('hidden');

                // Render updated selection
                renderSelectedPrompts();

                // Track selection
                vscode.postMessage({
                    type: 'selectPrompt',
                    promptId: prompt.id
                });
            }

            function removePrompt(promptId) {
                selectedPromptList = selectedPromptList.filter(p => p.id !== promptId);
                renderSelectedPrompts();
            }

            function renderSelectedPrompts() {
                selectedPrompts.innerHTML = '';

                if (selectedPromptList.length === 0) {
                    selectedPrompts.innerHTML = '<div style="color: var(--vscode-descriptionForeground); font-style: italic;">No prompts selected. Click on prompts above to add them.</div>';
                    return;
                }

                selectedPromptList.forEach(prompt => {
                    const item = document.createElement('div');
                    item.className = 'selected-prompt-item';
                    const categoryName = prompt.category?.display_name || prompt.category?.name || 'Unknown';
                    const categoryIcon = prompt.category?.icon || '📁';

                    item.innerHTML = categoryIcon + ' ' + categoryName +
                        '<span class="remove-btn" onclick="removePrompt(\'' + prompt.id + '\')">×</span>';
                    selectedPrompts.appendChild(item);
                });
            }

            function renderCategories(categoriesData) {
                categoryFilter.innerHTML = '<option value="">All Categories</option>';

                categoriesData.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category.id;
                    option.textContent = category.icon + ' ' + category.display_name;
                    categoryFilter.appendChild(option);
                });
            }

            function renderPrompts(promptsData) {
                prompts = promptsData;
                autocompleteList.innerHTML = '';

                if (prompts.length === 0) {
                    autocompleteList.innerHTML = '<div class="prompt-item">No prompts found</div>';
                } else {
                    prompts.forEach(prompt => {
                        const item = document.createElement('div');
                        item.className = 'prompt-item';
                        const categoryName = prompt.category?.display_name || prompt.category?.name || 'Unknown';
                        const categoryIcon = prompt.category?.icon || '📁';

                        item.innerHTML = '<div>' +
                            '<span class="prompt-type">' + categoryIcon + ' ' + categoryName + '</span>' +
                            '<span>Used ' + (prompt.usage_count || 0) + ' times</span>' +
                            '</div>' +
                            '<div class="prompt-text">' + prompt.prompt + '</div>';
                        item.addEventListener('click', () => selectPrompt(prompt));
                        autocompleteList.appendChild(item);
                    });
                }

                autocompleteList.classList.remove('hidden');
            }

            function renderEvents(eventsData) {
                events = eventsData;

                if (events.length === 0) {
                    eventsTable.classList.add('hidden');
                    document.getElementById('noEventsMessage').classList.remove('hidden');
                } else {
                    eventsTable.classList.remove('hidden');
                    document.getElementById('noEventsMessage').classList.add('hidden');

                    const tbody = eventsTable.querySelector('tbody');
                    tbody.innerHTML = '';

                    events.forEach(event => {
                        const row = document.createElement('tr');
                        row.innerHTML = '<td>' + event.event_type + '</td>' +
                            '<td><span class="status-' + event.result + '">' + event.result + '</span></td>' +
                            '<td>' + new Date(event.created_at).toLocaleString() + '</td>' +
                            '<td>' + JSON.stringify(event.context) + '</td>' +
                            '<td><button class="remediate-button" data-event-id="' + event.id + '">Remediate</button></td>';
                        tbody.appendChild(row);
                    });

                    // Add event listeners to remediate buttons
                    document.querySelectorAll('.remediate-button').forEach(button => {
                        button.addEventListener('click', () => {
                            const eventId = button.getAttribute('data-event-id');
                            vscode.postMessage({
                                type: 'remediateEvent',
                                eventId: eventId
                            });
                        });
                    });
                }
            }

            function updateConfig(config) {
                currentConfig = config;
                userIdSpan.textContent = config.userId || 'Not configured';
                teamIdSpan.textContent = config.teamId || 'Not configured';
                promptSearchEnabledSpan.textContent = config.promptSearchEnabled ? 'Enabled' : 'Disabled';
            }

            // Handle messages from extension
            window.addEventListener('message', event => {
                const message = event.data;

                switch (message.type) {
                    case 'configUpdate':
                        updateConfig(message.config);
                        break;

                    case 'categoriesLoaded':
                        renderCategories(message.categories);
                        break;

                    case 'promptSearchResults':
                        renderPrompts(message.prompts);
                        break;

                    case 'teamEventsLoaded':
                        renderEvents(message.events);
                        break;

                    case 'cacheInfoLoaded':
                        renderCacheInfo(message.cacheInfo);
                        break;

                    case 'remediationReady':
                        // Reset button state
                        const buttons = document.querySelectorAll('.remediate-button');
                        buttons.forEach(btn => {
                            btn.disabled = false;
                            btn.textContent = 'Remediate';
                        });
                        break;

                    case 'copilotSent':
                        vscode.window.showInformationMessage('✅ Prompts sent to Copilot chat!');
                        break;

                    case 'remediationError':
                        vscode.window.showErrorMessage('Remediation failed: ' + message.error);
                        // Reset button state
                        const errorButtons = document.querySelectorAll('.remediate-button');
                        errorButtons.forEach(btn => {
                            btn.disabled = false;
                            btn.textContent = 'Remediate';
                        });
                        break;
                }
            });

            function renderCacheInfo(cacheInfo) {
                const ageText = cacheInfo.age === Infinity ? 'Never' : cacheInfo.age + 'h ago';
                const sizeText = formatBytes(cacheInfo.size);
                const status = cacheInfo.isValid ? '✅ Valid' : '❌ Invalid';

                cacheStatus.innerHTML = '<div><strong>Status:</strong> ' + status + '</div>' +
                    '<div><strong>Age:</strong> ' + ageText + '</div>' +
                    '<div><strong>Size:</strong> ' + sizeText + '</div>' +
                    '<div><strong>Categories:</strong> ' + cacheInfo.categoriesCount + '</div>' +
                    '<div><strong>Prompts:</strong> ' + cacheInfo.promptsCount + '</div>';
            }

            function formatBytes(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            // Initialize
            vscode.postMessage({ type: 'getCategories' });
            vscode.postMessage({ type: 'getCacheInfo' });
            if (currentConfig.teamEventsEnabled) {
                vscode.postMessage({ type: 'loadTeamEvents' });
            }
        })();
    </script>
</body>

</html>
